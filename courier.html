<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق المندوب | Axon Express</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * { box-sizing: border-box; }
        :root { --primary-blue: #0A3D62; --primary-red: #b82329; --bg-color: #f4f7f6; --white: #ffffff; --dark-text: #2c3e50; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 70px; transition: 0.3s; color: var(--dark-text); overflow-x: hidden; }
        
        .header { background: var(--primary-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header-logo { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; }
        .toggle-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; font-family: 'Cairo'; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .toggle-btn:hover { transform: translateY(-2px); }
        .btn-online { background: #28a745; color: white; }
        .btn-offline { background: #dc3545; color: white; }
        
        .section-title { color: var(--primary-blue); border-bottom: 2px solid var(--primary-red); padding-bottom: 5px; margin-bottom: 15px; font-size: 16px; font-weight: 900; }
        
        .order-card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid var(--primary-red); box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; position: relative; overflow: hidden; }
        .distance-badge { position: absolute; top: 15px; left: 15px; background: #e0eaf5; color: var(--primary-blue); padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .order-card h4 { margin: 0 0 10px 0; font-size: 15px; }
        .order-card p { margin: 5px 0; font-size: 13px; color: #555; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-core { width: 100%; font-weight: bold; font-family: 'Cairo'; padding: 12px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-core:active { transform: scale(0.95); }
        .claim-btn { background: #ffc107; color: #000; }
        .reject-btn { background: var(--white); color: #dc3545; border: 1px solid #dc3545; }
        .nav-btn { background: #007bff; color: white; }
        .deliver-btn { background: #28a745; color: white; }
        
        body.dark-mode { --bg-color: #121212; --white: #1e1e1e; --dark-text: #e0e0e0; }
        body.dark-mode .status-bar, body.dark-mode .order-card { border-color: #333; }
        body.dark-mode .section-title { color: #66b2ff; }
        body.dark-mode .order-card p { color: #aaa; }
        body.dark-mode .reject-btn { background: transparent; }
        body.dark-mode .distance-badge { background: #062338; color: #66b2ff; }
        
        #loginSection { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, var(--primary-blue), #15558d); color: white; }
        #loginBox { background: var(--white); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #loginBox h3 { color: var(--primary-blue); margin-top: 0; }
        #loginBox input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; font-size: 14px; text-align: right; background: var(--bg-color); color: var(--dark-text); transition: 0.3s;}
        #loginBox input:focus { border-color: var(--primary-blue); outline: none; }
        #loginBox button { width: 100%; background: var(--primary-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-family: 'Cairo'; font-size: 16px; cursor: pointer; transition: 0.3s; }
        #loginBox button:hover { background: #991c22; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
        .alarm-active { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body>
    <div id="loginSection">
        <h2 style="margin-bottom:20px; color:white; font-weight:900;"><i class="fa-solid fa-motorcycle"></i> أكسون <span>كابتن</span></h2>
        <div id="loginBox">
            <h3>بوابة التحقق</h3>
            <p style="color:gray; font-size:13px; margin-bottom:15px;">الرجاء إدخال بيانات الـ DNA الرقمي الخاص بك</p>
            <input type="text" id="courierUsername" placeholder="كود الكابتن (مثال: ahmed)">
            <input type="password" id="courierPassword" placeholder="شفرة الدخول">
            <button id="loginBtn" onclick="window.loginCourier()">تسجيل الدخول للنظام</button>
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <div class="header">
            <div class="header-logo"><i class="fa-solid fa-crosshairs"></i> رادار القيادة</div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <button onclick="window.toggleRadio()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" title="تحكم الراديو">
                    <i id="radioIcon" class="fa-solid fa-volume-xmark"></i>
                </button>
                <button onclick="window.toggleTheme()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" title="الوضع الليلي">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
                <button onclick="window.logoutCourier()" style="background:none; border:none; color:var(--primary-red); font-size:20px; cursor:pointer;" title="انسحاب">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <div class="container">
            <div class="status-bar">
                <div>
                    <h3 style="margin: 0; color: var(--primary-blue); font-size: 16px;" id="courierNameDisplay">مرحباً يا بطل</h3>
                    <span id="statusText" style="color: #dc3545; font-weight: bold; font-size: 13px;">خارج التغطية 🔴</span>
                </div>
                <button id="toggleStatusBtn" class="toggle-btn btn-offline" onclick="window.toggleStatus()">بدء الوردية</button>
            </div>

            <h3 class="section-title"><i class="fa-solid fa-satellite-dish"></i> أهداف تكتيكية (الرادار)</h3>
            <div id="radarContainer">
                <p style='color:gray; text-align:center; font-size: 14px;'>الرادار في وضع السكون. ابدأ الوردية.</p>
            </div>

            <h3 class="section-title" style="margin-top: 30px;"><i class="fa-solid fa-motorcycle"></i> أهداف في عهدتي</h3>
            <div id="myTasksContainer">
                <p style='color:gray; text-align:center; font-size: 14px;'>لا توجد مهام نشطة</p>
            </div>
        </div>
    </div>

    <audio id="axonRadioPlayer" src="http://37.157.242.101:17317/stream" preload="none"></audio>

    <script type="module">
        import{initializeApp as a}from"https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";import{getAuth as b,signInWithEmailAndPassword as c,onAuthStateChanged as d,signOut as e}from"https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";import{getFirestore as f,collection as g,onSnapshot as h,doc as i,updateDoc as j,setDoc as k,serverTimestamp as l}from"https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";const app=a({apiKey:"AIzaSyBuGdQQZ2lDu73W7wP3na45rlhiMXjaqGw",authDomain:"axon-express-2f534.firebaseapp.com",projectId:"axon-express-2f534",storageBucket:"axon-express-2f534.firebasestorage.app",messagingSenderId:"958528400260",appId:"1:958528400260:web:504ae94f3ef2225b928bd1"});const auth=b(app);const db=f(app);let isO=false,cCN="",wId=null,cLat=null,cLng=null,iO=new Set(),aAI=null,isA=false;const sA=new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');sA.loop=true;function getD(lat1,lon1,lat2,lon2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return(R*c).toFixed(1);}function tTA(){if(isA)return;isA=true;sA.play().catch(e=>console.log("الصوت يحتاج تفاعل المستخدم"));if("vibrate"in navigator){navigator.vibrate([1000,500,1000,500,1000,500]);aAI=setInterval(()=>{navigator.vibrate([1000,500,1000,500]);},3000);}}function sTA(){if(isA){isA=false;sA.pause();sA.currentTime=0;if(aAI){clearInterval(aAI);aAI=null;}if("vibrate"in navigator)navigator.vibrate(0);}}d(auth,(user)=>{if(user&&user.email.includes("@courier.axon.com")){cCN=user.email.split('@')[0];document.getElementById('loginSection').style.display='none';document.getElementById('appContent').style.display='block';document.getElementById('courierNameDisplay').innerText=`كابتن / ${cCN}`;lR();}else{document.getElementById('loginSection').style.display='flex';document.getElementById('appContent').style.display='none';if(wId)navigator.geolocation.clearWatch(wId);sTA();}});window.loginCourier=async()=>{const user=document.getElementById('courierUsername').value.trim().toLowerCase();const pass=document.getElementById('courierPassword').value;if(!user||!pass)return Swal.fire('نقص بيانات','أدخل كود الكابتن وشفرة الدخول.','warning');const email=user+"@courier.axon.com";const btn=document.getElementById('loginBtn');btn.disabled=true;btn.innerHTML='جاري كسر التشفير...';try{await c(auth,email,pass);Swal.fire({toast:true,position:'top-end',icon:'success',title:'دخول مصرح به',showConfirmButton:false,timer:2000});}catch(error){Swal.fire('تم الرفض','البيانات غير متطابقة مع قاعدة أكسون.','error');btn.disabled=false;btn.innerHTML='تسجيل الدخول للنظام';}};window.logoutCourier=()=>{Swal.fire({title:'انسحاب تكتيكي؟',icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',confirmButtonText:'نعم، تسجيل خروج'}).then((result)=>{if(result.isConfirmed)e(auth);});};const rP=document.getElementById('axonRadioPlayer');window.toggleStatus=()=>{isO=!isO;const btn=document.getElementById("toggleStatusBtn"),txt=document.getElementById("statusText");sA.load();if(isO){btn.className="toggle-btn btn-online";btn.innerText="إنهاء الوردية";txt.innerHTML="متصل بالرادار 🟢";txt.style.color="#28a745";sT();}else{btn.className="toggle-btn btn-offline";btn.innerText="بدء الوردية";txt.innerHTML="خارج التغطية 🔴";txt.style.color="#dc3545";sTA();if(wId){navigator.geolocation.clearWatch(wId);wId=null;}if(auth.currentUser)k(i(db,"couriers",auth.currentUser.uid),{status:"offline"},{merge:true});}lR();};function sT(){if(navigator.geolocation){wId=navigator.geolocation.watchPosition(async(pos)=>{cLat=pos.coords.latitude;cLng=pos.coords.longitude;if(auth.currentUser&&isO){await k(i(db,"couriers",auth.currentUser.uid),{name:cCN,currentLocation:{lat:cLat,lng:cLng},lastSeen:l(),status:"active"},{merge:true});lR();}},(err)=>{Swal.fire('حجب الـ GPS','النظام أعمى! يرجى السماح للمتصفح بالوصول لموقعك.','error');},{enableHighAccuracy:true});}}function lR(){h(g(db,"eshteryly_orders"),(snap)=>{let aO=[];let tH="";let rA=false;snap.forEach(dS=>{const d=dS.data(),id=dS.id;let oL=null,oLg=null,dSStr="مسافة غير معلومة";const regex=/maps\.google\.com\/[01]([\d\.-]+),([\d\.-]+)/;const match=d.address?d.address.match(regex):null;if(match&&cLat&&cLng){oL=parseFloat(match[1]);oLg=parseFloat(match[2]);const distKm=getD(cLat,cLng,oL,oLg);dSStr=distKm+" كم 📍";d._distVal=parseFloat(distKm);}else{d._distVal=9999;}let cC="#ffc107";let iC="fa-cart-shopping";let tT="مهمة تسوق (اشتريلي)";let mI=`<p><b>الدفع:</b> <span style="color:var(--primary-red); font-weight:bold;">${d.paymentMethod}</span></p>`;if(d.paymentMethod==='pickup'){cC="#8e44ad";iC="fa-box-open";tT="أمر بيكب (استلام طرود)";mI=`<p><b>التاجر:</b> ${d.merchantEmail.split('@')[0]}</p>`;}else if(d.paymentMethod==='prepaid'){cC="#28a745";iC="fa-money-bill-wave";tT="شحن داخلي (دفع مقدم)";let amount=d.details.split('تحصيل: ')[1]||"غير محدد";mI=`<p style="background:#e8f5e9; padding:5px; border-radius:5px; border:1px solid #c3e6cb;">⚠️ <b>ادفع للتاجر:</b> <span style="color:#28a745; font-weight:bold;">${amount}</span></p>`;}else if(d.paymentMethod==='normal'){cC="#007bff";iC="fa-truck-fast";tT="شحن داخلي (توصيل وتحصيل)";let amount=d.details.split('تحصيل: ')[1]||"غير محدد";mI=`<p style="background:#cce5ff; padding:5px; border-radius:5px; border:1px solid #b8daff;">⚠️ <b>حصل من العميل:</b> <span style="color:#0056b3; font-weight:bold;">${amount}</span></p>`;}if(d.status==="جاري البحث عن مندوب"&&isO&&!iO.has(id)){aO.push({id,d,distanceStr:dSStr,cardColor:cC,iconClass:iC,taskTitle:tT,moneyInfo:mI});rA=true;}if(d.status==="تم الاستلام بواسطة المندوب"&&d.courierName===cCN){tH+=`<div class="order-card" style="border-right-color:${cC}"><div class="distance-badge">${dSStr}</div><h4 style="margin-top:15px; color:${cC};"><i class="fa-solid ${iC}"></i> ${tT}</h4><p><b>الوجهة:</b> ${d.address}</p><p><b>التف nc(r)=>{if(r.isConfirmed){await j(i(db,"eshteryly_orders",id),{status:"تم التسليم بنجاح"});Swal.fire('تمت المهمة','تم إغلاق الهدف بنجاح.','success');}});};window.openMap=(addr)=>{const dA=decodeURIComponent(addr);const regex=/http:\/\/googleusercontent\.com\/maps\.google\.com\/[01]([\d\.-]+),([\d\.-]+)/;const match=dA.match(regex);const isA=/android/i.test(navigator.userAgent);if(match){const lat=match[1];const lng=match[2];if(isA){window.location.href=`geo:${lat},${lng}?q=${lat},${lng}`;}else{window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`,'_blank');}}else{if(isA){window.location.href=`geo:0,0?q=${encodeURIComponent(dA)}`;}else{window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dA)}`,'_blank');}}};window.toggleRadio=()=>{const icon=document.getElementById('radioIcon');if(rP.paused){rP.src="http://37.157.242.101:17317/stream?cb="+new Date().getTime();rP.play().catch(err=>console.log("المتصفح يمنع التشغيل التلقائي"));icon.className='fa-solid fa-volume-high';icon.style.color='#28a745';}else{rP.pause();rP.src="";icon.className='fa-solid fa-volume-xmark';icon.style.color='white';}};window.toggleTheme=()=>{document.body.classList.toggle('dark-mode');const icon=document.getElementById('themeIcon');const isDark=document.body.classList.contains('dark-mode');localStorage.setItem('axon_courier_theme',isDark?'dark':'light');icon.className=isDark?'fa-solid fa-sun':'fa-solid fa-moon';icon.style.color=isDark?'#ffc107':'white';};if(localStorage.getItem('axon_courier_theme')==='dark'){document.body.classList.add('dark-mode');setTimeout(()=>{const icon=document.getElementById('themeIcon');if(icon){icon.className='fa-solid fa-sun';icon.style.color='#ffc107';}},100);}
    </script>
</body>
</html>
