<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة التجار | Axon Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --primary-blue: #0A3D62; --primary-red: #b82329; --white: #ffffff; --light-bg: #f4f7f6; --dark-text: #2c3e50; --border-color: #eee; }
        html, body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--light-bg); color: var(--dark-text); overflow-x: hidden; scroll-behavior: smooth; transition: background 0.3s, color 0.3s;}
        
        header { background: var(--white); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary-red); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;}
        .logo { font-size: 20px; font-weight: 900; color: var(--primary-blue); text-decoration: none;}
        .logo span { color: var(--primary-red); }
        .header-actions { display: flex; align-items: center;}
        #logoutBtn { background: var(--white); border: 2px solid var(--primary-red); color: var(--primary-red); padding: 6px 15px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; transition: 0.3s;}
        #logoutBtn:hover { background: var(--primary-red); color: var(--white); }
        
        .container { padding: 15px; max-width: 1200px; margin: 0 auto; min-height: 80vh;}
        .merchant-badge { background: var(--primary-blue); padding: 6px 15px; border-radius: 20px; font-size: 13px; margin-bottom: 20px; display: inline-block; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(10, 61, 98, 0.2);}
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 4px solid var(--primary-blue); transition: 0.3s;}
        .stat-card h3 { font-size: 15px; margin: 0 0 10px 0; color: #666; transition: 0.3s;}
        .stat-card .value { font-size: 24px; font-weight: 900; color: var(--primary-blue);}
        
        .actions-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .btn-core { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .btn-core:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .add-btn { background: var(--primary-red); color: white; }
        .eshteryly-btn { background: #28a745; color: white; }
        
        .search-box { flex: 1; min-width: 250px; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; outline: none; transition: 0.3s; background: var(--white); color: var(--dark-text);}
        .search-box:focus { border-color: var(--primary-blue); box-shadow: 0 0 5px rgba(10, 61, 98, 0.3); }
        
        .table-responsive { width: 100%; overflow-x: auto; background: var(--white); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid var(--border-color);}
        table { width: 100%; min-width: 800px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border-color); font-size: 13px; transition: 0.3s;}
        th { background: var(--primary-blue); color: var(--white); }
        tr:hover { background-color: rgba(0,0,0,0.02); }
        
        .print-btn { background: #333; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; font-weight: bold;}
        .print-btn:hover { opacity: 0.8; }
        .awb-badge { background: #e0eaf5; color: var(--primary-blue); padding: 4px 10px; border-radius: 5px; font-weight: bold; transition: 0.3s; letter-spacing: 1px;}
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; z-index: 1000; padding: 15px; backdrop-filter: blur(5px);}
        .modal-content { background: var(--white); padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; transition: 0.3s;}
        .input-group label { font-size: 13px; font-weight: bold; color: var(--primary-blue); margin-top: 10px; display: block; }
        .input-group input, .input-group select, .modal-content textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; background: var(--white); color: var(--dark-text); transition: 0.3s;}
        .input-group input:focus, .input-group select:focus, .modal-content textarea:focus { border-color: var(--primary-blue); outline: none; }
        .close-btn { position: absolute; top: 15px; left: 15px; border: none; background: none; font-size: 24px; cursor: pointer; color: var(--primary-red); transition: 0.3s;}
        .close-btn:hover { transform: scale(1.1); }

        /* الشبكة العصبية للتواصل (Social Footer) */
        .social-footer { text-align: center; padding: 20px; margin-top: 30px; border-top: 1px solid var(--border-color); transition: 0.3s; }
        .social-footer p { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: bold; }
        .social-icons { display: flex; justify-content: center; gap: 15px; }
        .social-icons a { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; color: white; text-decoration: none; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .social-icons a:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        .icon-fb { background: #1877F2; }
        .icon-yt { background: #FF0000; }
        .icon-tk { background: #000000; }
        
        /* ---------------- مصفوفة الظلام (Dark Mode) ---------------- */
        body.dark-mode { --white: #1e1e1e; --light-bg: #121212; --dark-text: #e0e0e0; --border-color: #333; }
        body.dark-mode header { background: #1e1e1e; border-bottom: 3px solid var(--primary-red); }
        body.dark-mode .stat-card h3 { color: #aaa; }
        body.dark-mode .search-box { background: #2c2c2c; border-color: #444; }
        body.dark-mode th { background: #062338; border-color: #333; }
        body.dark-mode tr:hover { background-color: rgba(255,255,255,0.05); }
        body.dark-mode .awb-badge { background: #062338; color: #66b2ff; }
        body.dark-mode .modal-content { border: 1px solid #333; }
        body.dark-mode .input-group input, body.dark-mode .input-group select, body.dark-mode .modal-content textarea { background: #2c2c2c; border-color: #444; }
        body.dark-mode #logoutBtn { background: transparent; }
        body.dark-mode #instapayDetails { background: #0d233a !important; border-color: #1a4a7a !important; }
        body.dark-mode #vfcashDetails { background: #3e1919 !important; border-color: #7a2e2e !important; }
        body.dark-mode #ajelDetails { background: #2c2c2c !important; border-color: #444 !important; }
        body.dark-mode .icon-tk { background: #333; border: 1px solid #555; }
        body.dark-mode .social-footer p { color: #aaa; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo"><i class="fa-solid fa-truck-fast"></i> AXON <span>EXPRESS</span></a>
        <div class="header-actions">
            <button onclick="window.toggleRadio()" style="background:none; border:none; color:var(--primary-red); font-size:24px; cursor:pointer; margin-left:15px;" title="راديو أكسون">
                <i id="radioIcon" class="fa-solid fa-radio"></i>
            </button>
            <button onclick="window.toggleTheme()" style="background:none; border:none; color:var(--primary-blue); font-size:24px; cursor:pointer; margin-left:15px;" title="الوضع الليلي">
                <i id="themeIcon" class="fa-solid fa-moon"></i>
            </button>
            <button id="logoutBtn" onclick="window.logout()">خروج</button>
        </div>
    </header>

    <div class="container">
        <div class="merchant-badge" id="merchantEmailDisplay">تهيئة المحطة...</div>
        <div class="stats-grid">
            <div class="stat-card"><h3>إجمالي شحناتك النشطة</h3><div class="value" id="totalShipments">0</div></div>
            <div class="stat-card"><h3>التحصيلات المتوقعة (COD)</h3><div class="value" id="totalMoney" style="color:var(--primary-red);">0 ج.م</div></div>
        </div>
        <div class="actions-bar">
            <button class="btn-core add-btn" onclick="document.getElementById('addModal').style.display='flex'">
                <i class="fa-solid fa-plus"></i> إصدار بوليصة
            </button>
            <button class="btn-core eshteryly-btn" onclick="document.getElementById('eshterylyModal').style.display='flex'">
                <i class="fa-solid fa-cart-shopping"></i> طلب (اشتريلي)
            </button>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث برقم البوليصة، الاسم، أو المحافظة...">
        </div>
        <div class="table-responsive">
            <table>
                <thead><tr><th>رقم البوليصة</th><th>المستلم</th><th>الموبايل</th><th>المحافظة</th><th>المبلغ</th><th>الحالة</th><th>إجراء</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="social-footer">
        <p>تواصل مع قيادة أكسون إكسبريس</p>
        <div class="social-icons">
            <a href="https://www.facebook.com/share/1CJDtTPczM/" target="_blank" class="icon-fb" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://www.tiktok.com/@axon.express?_r=1&_t=ZS-94qcUcPnr64" target="_blank" class="icon-tk" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://youtube.com/@axonexpress?si=e0weghiHfY4qXavl" target="_blank" class="icon-yt" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('addModal').style.display='none'">✖</button>
            <h3 style="color:var(--primary-blue); border-bottom: 2px solid var(--primary-red); padding-bottom:10px; margin-top:0;">إصدار بوليصة شحن</h3>
            <div class="input-group"><label>اسم المستلم</label><input type="text" id="recName" placeholder="الاسم ثلاثي"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1;"><label>الموبايل الأساسي</label><input type="tel" id="recPhone" placeholder="01xxxxxxxxx"></div>
                <div class="input-group" style="flex:1;"><label>موبايل احتياطي</label><input type="tel" id="recPhone2" placeholder="اختياري"></div>
            </div>
            <div class="input-group"><label>المحافظة</label><input type="text" id="recCity" placeholder="مثال: الإسكندرية"></div>
            <div class="input-group"><label>العنوان بالتفصيل</label><input type="text" id="recAddress" placeholder="الشارع، العمارة، الشقة"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1;"><label>الوزن (كجم)</label><input type="number" id="recWeight" value="1" min="1"></div>
                <div class="input-group" style="flex:1;"><label>المبلغ المطلوب (COD)</label><input type="number" id="codAmount" placeholder="ج.م"></div>
            </div>
            <button class="btn-core add-btn" id="btnSave" style="width:100%; margin-top:15px; justify-content:center; padding:12px;" onclick="window.saveShipment()">حفظ وتوليد البوليصة</button>
        </div>
    </div>

    <div id="eshterylyModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('eshterylyModal').style.display='none'">✖</button>
            <h3 style="color:var(--primary-blue); border-bottom: 2px solid var(--primary-red); padding-bottom:10px; margin-top:0;">🛒 مهمة تسوق (اشتريلي)</h3>
            
            <textarea id="eshDetails" placeholder="اكتب طلباتك بالتفصيل الدقيق..." rows="3"></textarea>
            
            <div class="input-group"><label>عنوان توصيل المشتريات</label><input type="text" id="eshAddress" placeholder="العنوان أو الصق رابط اللوكيشن"></div>
            
            <button type="button" id="locationBtn" onclick="window.getLocation()" style="background:#0A3D62; color:white; border:none; padding:10px; border-radius:8px; margin:15px 0 5px 0; width:100%; cursor:pointer; font-family:'Cairo'; font-weight:bold; transition:0.3s;">📍 سحب إحداثيات موقعي الحالي</button>
            
            <div class="input-group">
                <label>طريقة دفع قيمة المشتريات</label>
                <select id="eshPayment" onchange="window.togglePaymentDetails()">
                    <option value="">-- حدد وسيلة الدفع --</option>
                    <option value="cash">كاش عند الاستلام</option>
                    <option value="balance">خصم من مستحقاتي لدى أكسون</option>
                    <option value="ajel">دفع آجل (تضاف رسوم الخدمة)</option>
                    <option value="instapay">تحويل InstaPay</option>
                    <option value="vfcash">تحويل Vodafone Cash</option>
                </select>
            </div>

            <div id="instapayDetails" style="display:none; background:#f0f8ff; padding:12px; border-radius:8px; margin-top:10px; border:1px solid #b8daff;">
                <p style="margin:0; font-weight:bold; color:var(--primary-blue);">حساب InstaPay: <span style="color:red;">01027660260</span></p>
            </div>
            <div id="vfcashDetails" style="display:none; background:#ffebeb; padding:12px; border-radius:8px; margin-top:10px; border:1px solid #f5c6cb;">
                <p style="margin:0; font-weight:bold; color:var(--primary-blue);">محفظة فودافون: <span style="font-size:16px; color:var(--primary-red);">01030013810</span></p>
            </div>
            <div id="ajelDetails" style="display:none; background:#f9f9f9; padding:12px; border-radius:8px; margin-top:10px; border:1px solid #ccc;">
                <label style="font-weight:bold; color:var(--primary-red); display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" id="ajelAgree" style="width:18px; height:18px; margin:0;"> 
                    أوافق على إضافة رسوم خدمة الدفع الآجل
                </label>
            </div>
            
            <div style="margin:15px 0; padding:12px; background:#fff3cd; border-radius:8px; border:1px solid #ffeeba;">
                <label style="font-weight:bold; color:#856404; display:flex; align-items:flex-start; gap:8px; cursor:pointer;">
                    <input type="checkbox" id="legalAgree" style="width:18px; height:18px; margin-top:2px;"> 
                    أقر بمسؤوليتي عن هذا الطلب وموافقتي على سياسة أكسون اللوجستية
                </label>
            </div>

            <button class="btn-core eshteryly-btn" style="width:100%; justify-content:center; padding:12px;" onclick="window.submitEshteryly()">بث الطلب للإدارة</button>
        </div>
    </div>

    <audio id="axonRadioPlayer" src="http://37.157.242.101:17317/stream" preload="none"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyBuGdQQZ2lDu73W7wP3na45rlhiMXjaqGw",
            authDomain: "axon-express-2f534.firebaseapp.com",
            projectId: "axon-express-2f534",
            storageBucket: "axon-express-2f534.firebasestorage.app",
            messagingSenderId: "958528400260",
            appId: "1:958528400260:web:504ae94f3ef2225b928bd1"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);
        let merchantEmail = "", merchantName = "";

        // --- المصادقة وجلب البيانات ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                merchantEmail = user.email;
                merchantName = merchantEmail.split('@')[0];
                document.getElementById('merchantEmailDisplay').innerHTML = `مرحباً بك: ${merchantName} <i class="fa-solid fa-bolt" style="color:#ffc107;"></i>`;
                loadShipments();
            } else { window.location.href = "index.html"; }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

        // --- إصدار البوليصة العادية ---
        window.saveShipment = async () => {
            const name = document.getElementById('recName').value;
            const phone = document.getElementById('recPhone').value.trim();
            const city = document.getElementById('recCity').value;
            const address = document.getElementById('recAddress').value;
            const amount = document.getElementById('codAmount').value;

            if(!name || !phone || !city || !address || !amount) return Swal.fire('نقص بيانات', 'لا يمكن توليد البوليصة ببيانات مفقودة.', 'warning');
            if(!/^01[0125][0-9]{8}$/.test(phone)) return Swal.fire('خطأ هيكلي', 'رقم الموبايل غير صحيح.', 'error');

            const btn = document.getElementById('btnSave'); btn.disabled = true; btn.innerHTML = "جاري التشفير...";
            try {
                await addDoc(collection(db, "shipments"), {
                    merchantEmail, name, phone, phone2: document.getElementById('recPhone2').value || "لا يوجد",
                    city, address, weight: Number(document.getElementById('recWeight').value||1),
                    amount: Number(amount), status: "قيد التوصيل", deleted: false, timestamp: new Date()
                });
                document.getElementById('addModal').style.display='none';
                Swal.fire({toast:true, position:'top-end', icon:'success', title:'تم إصدار البوليصة', showConfirmButton:false, timer:2000});
                document.querySelectorAll('#addModal input').forEach(inp => inp.value = '');
            } catch(e) { Swal.fire('خطأ بالشبكة', e.message, 'error'); }
            btn.disabled = false; btn.innerHTML = "حفظ وتوليد البوليصة";
        };

        // --- تحميل الشحنات ---
        function loadShipments() {
            // ملاحظة: لاستخدام orderBy مع where تحتاج لفهرس (Index) في فايربيز، لذلك نكتفي بـ where هنا.
            onSnapshot(query(collection(db, "shipments"), where("merchantEmail", "==", merchantEmail)), (snap) => {
                let total = 0, html = "", count = 0;
                // نعكس المصفوفة محلياً لترتيبها من الأحدث للأقدم
                let docs = [];
                snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
                docs.sort((a, b) => b.timestamp - a.timestamp);

                docs.forEach(d => {
                    if(d.deleted) return;
                    total += Number(d.amount) || 0; count++;
                    const awb = "AXN" + d.id.substring(0,5).toUpperCase();
                    html += `<tr><td><span class="awb-badge">${awb}</span></td><td><b>${d.name}</b></td>
                        <td dir="ltr">${d.phone}</td><td>${d.city}</td><td style="color:var(--primary-red); font-weight:bold;">${d.amount}</td>
                        <td style="font-weight:bold; color:${d.status==='تم التسليم'?'#28a745':(d.status==='مرتجع'?'#dc3545':'#f39c12')}">${d.status}</td>
                        <td><button class="print-btn" onclick="window.printWB('${awb}', '${d.name}', '${d.phone}', '${d.phone2}', '${d.city}', '${d.address}', '${d.weight}', '${d.amount}')"><i class="fa-solid fa-print"></i> طباعة A5</button></td></tr>`;
                });
                document.getElementById('tableBody').innerHTML = html;
                document.getElementById('totalShipments').innerText = count;
                document.getElementById('totalMoney').innerText = total + " ج.م";
            });
        }

        // --- هندسة الطباعة الصارمة (Strict A5 Geometry) ---
        window.printWB = (awb, name, p1, p2, city, addr, w, amt) => {
            const printContent = `
            <!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>AWB: ${awb}</title>
            <style>
                @media print {
                    @page { size: A5 portrait; margin: 0; }
                    body { margin: 0; padding: 0; background: #fff; display: flex; justify-content: center; align-items: flex-start; }
                    .strict-a5-wrapper { 
                        width: 148mm; height: 200mm; 
                        padding: 10mm; box-sizing: border-box; 
                        border: 2px solid #000; overflow: hidden; page-break-after: always;
                    }
                }
                body { font-family: sans-serif; background: #eee; display: flex; justify-content: center; padding: 20px; }
                .strict-a5-wrapper { background: white; width: 148mm; min-height: 200mm; padding: 10mm; box-sizing: border-box; border: 2px solid #000; }
                .header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5mm; margin-bottom: 5mm; }
                .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5mm; margin-bottom: 5mm; border: 1px solid #000; padding: 5mm; }
                .cod { text-align: center; border: 2px solid #000; padding: 5mm; background: #f9f9f9; }
                p { margin: 5px 0; font-size: 14px; } h3 { margin: 0 0 10px 0; font-size: 16px;}
            </style>
            <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"><\/script>
            </head><body>
                <div class="strict-a5-wrapper">
                    <div class="header">
                        <div><h2 style="margin:0;">AXON EXPRESS</h2><p style="margin:0;color:#666;">الإسكندرية - المنشية</p></div>
                        <div style="text-align:center;"><svg id="bc"></svg><br><b style="font-size:18px;">${awb}</b></div>
                    </div>
                    <div class="grid">
                        <div><h3>بيانات المرسل</h3><p>التاجر: <b>${merchantName}</b></p><p>الوزن: <b>${w} كجم</b></p></div>
                        <div style="border-right:1px solid #000; padding-right:5mm;">
                            <h3>بيانات المستلم</h3><p>الاسم: <b>${name}</b></p><p>الهاتف: <b dir="ltr">${p1}</b></p>
                            ${p2 && p2 !== 'undefined' && p2 !== 'لا يوجد' ? `<p>بديل: <b dir="ltr">${p2}</b></p>` : ''}
                            <p>المحافظة: <b>${city}</b></p><p>العنوان: <b>${addr}</b></p>
                        </div>
                    </div>
                    <div class="cod"><h3>المبلغ المطلوب تحصيله (COD)</h3><h1 style="margin:0; font-size: 32px;">${amt} EGP</h1></div>
                    <div style="text-align:center; font-size:12px; margin-top:10mm; font-weight:bold;">تم الإصدار إلكترونياً من بوابة التجار | خدمة العملاء: 01147000882</div>
                </div>
                <script>JsBarcode("#bc", "${awb}", {format:"CODE128", width:2, height:45, displayValue:false}); setTimeout(window.print, 500);<\/script>
            </body></html>`;
            const win = window.open('', '_blank');
            win.document.write(printContent); win.document.close();
        };

        // --- اشتريلي ---
        window.togglePaymentDetails = () => {
            const val = document.getElementById('eshPayment').value;
            document.getElementById('instapayDetails').style.display = val === 'instapay' ? 'block' : 'none';
            document.getElementById('vfcashDetails').style.display = val === 'vfcash' ? 'block' : 'none';
            document.getElementById('ajelDetails').style.display = val === 'ajel' ? 'block' : 'none';
        };

        window.submitEshteryly = async () => {
            const details = document.getElementById('eshDetails').value.trim();
            const address = document.getElementById('eshAddress').value.trim();
            const payment = document.getElementById('eshPayment').value;
            
            if(!details || !address || !payment) return Swal.fire('تنبيه', 'البيانات غير مكتملة.', 'warning');
            if(payment === 'ajel' && !document.getElementById('ajelAgree').checked) return Swal.fire('خطأ', 'يلزم الموافقة على شروط الدفع الآجل.', 'error');
            if(!document.getElementById('legalAgree').checked) return Swal.fire('رفض العملية', 'يجب إقرار المسؤولية قبل الإرسال.', 'error');

            try {
                await addDoc(collection(db, "eshteryly_orders"), {
                    merchantEmail, details, address, paymentMethod: payment, status: "قيد المراجعة", timestamp: new Date()
                });
                document.getElementById('eshterylyModal').style.display='none';
                Swal.fire({icon:'success', title:'تم الاستلام', text:'مهمتك الآن على رادار الإدارة', timer:2000});
                document.getElementById('eshDetails').value = ''; document.getElementById('eshAddress').value = '';
                document.getElementById('eshPayment').value = ''; document.getElementById('legalAgree').checked = false;
                window.togglePaymentDetails();
            } catch(e) { Swal.fire('خطأ', e.message, 'error'); }
        };

        // --- الهندسة الجغرافية (إصلاح رابط اللوكيشن) ---
        window.getLocation = () => {
            const btn = document.getElementById('locationBtn');
            if(navigator.geolocation) {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري قراءة الأقمار الصناعية...';
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        const addressField = document.getElementById('eshAddress');
                        addressField.value = addressField.value ? addressField.value + ` \n📍 ${link}` : `📍 ${link}`;
                        btn.innerHTML = '✅ تم التقاط الإحداثيات';
                        setTimeout(() => btn.innerHTML = '📍 سحب إحداثيات موقعي الحالي', 3000);
                    },
                    (err) => { btn.innerHTML = '📍 سحب إحداثيات موقعي الحالي'; Swal.fire('تم الحجب', 'الرجاء تفعيل إذن الـ GPS في المتصفح.', 'error'); },
                    { enableHighAccuracy: true }
                );
            }
        };

        // --- محرك البحث ---
        document.getElementById('searchInput').addEventListener('keyup', function() {
            const val = this.value.toLowerCase();
            document.querySelectorAll('#tableBody tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        });

        // --- نظام التحكم البيئي (Radio & Theme) ---
        const radioPlayer = document.getElementById('axonRadioPlayer');
        const radioIcon = document.getElementById('radioIcon');
        const themeIcon = document.getElementById('themeIcon');

        window.toggleRadio = () => {
            if (radioPlayer.paused) {
                radioPlayer.src = "http://37.157.242.101:17317/stream?" + new Date().getTime(); // Anti-Cache Logic
                radioPlayer.play();
                radioIcon.style.color = '#28a745';
                radioIcon.classList.add('fa-beat');
            } else {
                radioPlayer.pause();
                radioIcon.style.color = 'var(--primary-red)';
                radioIcon.classList.remove('fa-beat');
            }
        };

        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('axon_merchant_theme', isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        };
        
        if(localStorage.getItem('axon_merchant_theme') === 'dark') {
            document.body.classList.add('dark-mode');
            setTimeout(() => { if(themeIcon) themeIcon.className = 'fa-solid fa-sun'; }, 100);
        }
    </script>
</body>
</html>
