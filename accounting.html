<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخ المالي المحترف | Axon Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --primary-blue: #0A3D62; --primary-red: #b82329; --bg-color: #f4f7f6; --card-bg: #fff; --text-dark: #333; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg-color); color: var(--text-dark); }
        header { background: var(--primary-blue); padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;}
        header h1 { margin: 0; font-size: 20px; font-weight: 900; }
        header h1 span { color: var(--primary-red); }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #e0eaf5; border: none; padding: 10px 15px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; color: var(--primary-blue); cursor: pointer; transition: 0.3s; flex: 1; min-width: 120px; font-size: 13px; }
        .tab-btn.active { background: var(--primary-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid var(--primary-blue); }
        .stat-card.red { border-bottom-color: var(--primary-red); }
        .stat-card.green { border-bottom-color: #28a745; }
        .stat-card h3 { margin: 0 0 5px 0; font-size: 12px; color: #666; }
        .stat-card .value { font-size: 24px; font-weight: 900; color: var(--primary-blue); }
        .table-responsive { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #e0eaf5; color: var(--primary-blue); }
        .btn-add { background: var(--primary-red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; margin-bottom: 15px;}
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <header>
        <h1>AXON <span>FINANCE</span></h1>
        <div style="font-size: 12px;"><i class="fa-solid fa-lock"></i> الخزينة الذكية - أكسون</div>
    </header>

    <div class="container">
        <div id="loading" style="text-align:center; padding:50px;"><i class="fa-solid fa-spinner fa-spin"></i> جاري ربط الحسابات بأسماء المناديب...</div>

        <div id="dashboard" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('overview')">الموقف العام</button>
                <button class="tab-btn" onclick="showTab('couriers')">عهد الكباتن</button>
                <button class="tab-btn" onclick="showTab('merchants')">تسويات التجار</button>
                <button class="tab-btn" onclick="showTab('expenses')">المصروفات</button>
            </div>

            <div id="overview" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card"><h3>إجمالي الكاش (عهد)</h3><div class="value" id="statCustody">0</div></div>
                    <div class="stat-card red"><h3>مستحقات التجار</h3><div class="value" id="statDues">0</div></div>
                    <div class="stat-card green"><h3>أرباح الشحن</h3><div class="value" id="statProfit">0</div></div>
                </div>
            </div>

            <div id="couriers" class="tab-content">
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>الكابتن</th><th>شحنات مسلمة</th><th>العهدة الحالية</th><th>إجراء</th></tr></thead>
                        <tbody id="tblCouriers"></tbody>
                    </table>
                </div>
            </div>

            <div id="merchants" class="tab-content">
                <div class="table-responsive"><table><thead><tr><th>التاجر</th><th>مسلم</th><th>COD</th><th>رسوم</th><th>الصافي</th></tr></thead><tbody id="tblMerchants"></tbody></table></div>
            </div>

            <div id="expenses" class="tab-content">
                <button class="btn-add" onclick="openModal('modalExp')">+ إضافة مصروف</button>
                <div class="table-responsive"><table><thead><tr><th>التاريخ</th><th>البند</th><th>المبلغ</th></tr></thead><tbody id="tblExpenses"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="modalExp" class="modal"><div class="modal-content"><h3>تسجيل مصروف</h3><input type="text" id="expDesc" placeholder="البند" style="width:100%;margin-bottom:10px;padding:10px;"><input type="number" id="expAmt" placeholder="المبلغ" style="width:100%;margin-bottom:10px;padding:10px;"><button class="btn-add" style="width:100%" onclick="saveExp()">حفظ</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuGdQQZ2lDu73W7wP3na45rlhiMXjaqGw",
            authDomain: "axon-express-2f534.firebaseapp.com",
            projectId: "axon-express-2f534",
            storageBucket: "axon-express-2f534.firebasestorage.app",
            messagingSenderId: "958528400260",
            appId: "1:958528400260:web:504ae94f3ef2225b928bd1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const FEE = 50;

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';

        onAuthStateChanged(auth, (user) => { if (user) { loadData(); } else { window.location.href = "index.html"; } });

        function loadData() {
            onSnapshot(query(collection(db, "shipments"), where("status", "==", "تم التسليم")), (snap) => {
                let merchants = {}, couriers = {}, totalCustody = 0, totalProfit = 0;
                
                snap.forEach(doc => {
                    let d = doc.data(); if(d.deleted) return;
                    let amt = Number(d.amount)||0, mEmail = d.merchantEmail||"غير مسجل";
                    
                    // السحر هنا: لو المندوب مابعتش اسمه، المحاسب هيجيب اسم المندوب "المسؤول" أصلاً عن الشحنة
                    let cName = d.courier || d.courierEmail?.split('@')[0] || "كابتن غير مسمى";

                    if(!merchants[mEmail]) merchants[mEmail] = { cod:0, count:0 };
                    merchants[mEmail].count++; merchants[mEmail].cod += amt;
                    
                    if(!couriers[cName]) couriers[cName] = { count:0, cash:0 };
                    couriers[cName].count++; couriers[cName].cash += amt;

                    totalCustody += amt; totalProfit += FEE;
                });

                document.getElementById('statCustody').innerText = totalCustody.toLocaleString();
                document.getElementById('statProfit').innerText = totalProfit.toLocaleString();
                document.getElementById('statDues').innerText = (totalCustody - totalProfit).toLocaleString();

                let cHtml = ""; for(let c in couriers) {
                    cHtml += `<tr><td><b>${c}</b></td><td>${couriers[c].count}</td><td style="color:red;font-weight:bold;">${couriers[c].cash} ج.م</td><td><button class="tab-btn" onclick="alert('سند قبض من ${c}')">طباعة إيصال</button></td></tr>`;
                }
                document.getElementById('tblCouriers').innerHTML = cHtml || "<tr><td colspan='4'>لا توجد عهد حالياً</td></tr>";

                let mHtml = ""; for(let m in merchants) {
                    let mNet = merchants[m].cod - (merchants[m].count * FEE);
                    mHtml += `<tr><td>${m.split('@')[0]}</td><td>${merchants[m].count}</td><td>${merchants[m].cod}</td><td>${merchants[m].count * FEE}</td><td style="color:green;font-weight:bold;">${mNet}</td></tr>`;
                }
                document.getElementById('tblMerchants').innerHTML = mHtml;
                document.getElementById('loading').style.display='none'; document.getElementById('dashboard').style.display='block';
            });
        }
    </script>
</body>
</html>
